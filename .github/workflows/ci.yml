name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run unit and H2 integration tests
        run: mvn -B test -Dtest='!*Postgres*'

      - name: Build package (verify compile)
        run: mvn -B package -DskipTests

  backend-postgres:
    name: Backend (PostgreSQL IT)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run PostgreSQL integration tests
        run: mvn -B test -Dtest='*Postgres*'

  openapi:
    name: OpenAPI spec export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Generate OpenAPI JSON
        run: mvn -B -Popenapi-export verify -DskipTests

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: target/openapi/openapi.json
          if-no-files-found: error

  frontend:
    name: Frontend (lint, types, unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api
          NEXT_PUBLIC_APP_NAME: Library Management System
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_PWA_ENABLED: "false"
