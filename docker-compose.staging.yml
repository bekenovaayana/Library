# Staging overlay: JSON logs, Prometheus metrics, backup sidecar.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  app:
    environment:
      SPRING_PROFILES_ACTIVE: staging
    ports:
      - "${APP_PORT:-8081}:8080"

  frontend:
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: library-postgres-backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - library-network

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: library-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - library-network
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_backups:
