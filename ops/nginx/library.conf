# Example reverse proxy for production / staging.
# TLS certificates: mount /etc/letsencrypt or your cert paths.

upstream library_api {
    server app:8080;
}

upstream library_web {
    server frontend:3000;
}

server {
    listen 80;
    server_name library.example.com;

    # Redirect HTTP to HTTPS in production (uncomment when TLS is configured)
    # return 301 https://$host$request_uri;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://library_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
    }

    location /actuator/ {
        # Restrict metrics/health scraping to internal networks in production
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://library_api/actuator/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://library_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
