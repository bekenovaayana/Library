spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:openapi_export;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: false

application:
  security:
    jwt:
      secret-key: openapi-export-jwt-secret-key-min-32-chars-long
      expiration-ms: 3600000
