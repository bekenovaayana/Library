spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.library.management: INFO
    org.springframework.web: WARN
