spring:
  application:
    name: library-management-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/library_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Existing DBs created via ddl-auto: baseline marks V1 as applied without re-running
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

application:
  library:
    borrow-days: ${LIBRARY_BORROW_DAYS:14}
    max-books-per-user: ${LIBRARY_MAX_BOOKS_PER_USER:5}
    fine-per-day: ${LIBRARY_FINE_PER_DAY:1.00}
    max-fine: ${LIBRARY_MAX_FINE:50.00}
    reminder-days-before-due: ${LIBRARY_REMINDER_DAYS:2}
    notifications-enabled: ${LIBRARY_NOTIFICATIONS_ENABLED:true}
  security:
    jwt:
      secret-key: ${JWT_SECRET:library-management-jwt-secret-key-min-32-chars}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  auth:
    rate-limit:
      login-register-max: ${AUTH_RATE_LIMIT_MAX:10}
      window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SEC:60}
    refresh-token:
      expiration-days: ${AUTH_REFRESH_EXPIRATION_DAYS:7}
    password-reset:
      expiration-minutes: ${AUTH_PASSWORD_RESET_EXPIRATION_MIN:60}
      expose-token-in-response: ${AUTH_EXPOSE_RESET_TOKEN:false}

---
spring:
  config:
    activate:
      on-profile: dev

application:
  auth:
    password-reset:
      expose-token-in-response: true

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.library.management: INFO
