spring:
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

application:
  security:
    jwt:
      secret-key: test-jwt-secret-key-for-library-management-tests
      expiration-ms: 3600000
  auth:
    rate-limit:
      login-register-max: 1000
      window-seconds: 60
