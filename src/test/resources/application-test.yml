spring:
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:library_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  servlet:
    context-path: /api

application:
  security:
    jwt:
      secret-key: test-jwt-secret-key-for-library-management-tests
      expiration-ms: 3600000
  auth:
    rate-limit:
      login-register-max: 1000
      window-seconds: 60
    password-reset:
      expose-token-in-response: true
